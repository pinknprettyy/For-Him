<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Our Memories ♡</title>
</head>

<body class="gallery-page">

<div class="gallery-wrapper">

    <img src="images/ourmemories.png" class="memory-label">

    <div class="gallery">

        <img src="images/open-book.png" class="book">

        <!-- LEFT PAGE -->

        <div class="scrap left-page">

            <div class="tape tape-left"></div>

            <img id="leftPhoto" class="scrap-photo">

            <p id="leftText" class="scrap-text"></p>

            <img src="images/flower.png" class="sticker flower">

        </div>
        <!-- RIGHT PAGE -->

        <div class="scrap right-page">

            <div class="tape tape-right"></div>

            <img id="rightPhoto" class="scrap-photo">

            <p id="rightText" class="scrap-text"></p>

            <img src="images/bow.png" class="sticker bow">

        </div>

<button class="arrow left" onclick="previousPage()">❮</button>
<button class="arrow right" onclick="nextPage()">❯</button>

</div>

<script src="gallery.js"></script>

</body>
</html>
